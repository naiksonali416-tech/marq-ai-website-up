<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#89B927"/>
      <stop offset="100%" stop-color="#5a8a00"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="#0b1929" stroke="url(#g2)" stroke-width="2.5"/>
  <circle cx="100" cy="100" r="78" fill="none" stroke="rgba(137,185,39,0.2)" stroke-width="1" stroke-dasharray="4,4"/>
  <!-- Person silhouette -->
  <circle cx="100" cy="62" r="18" fill="none" stroke="#89B927" stroke-width="2.5" filter="url(#glow2)"/>
  <path d="M70 140 Q70 100 100 95 Q130 100 130 140" fill="none" stroke="#89B927" stroke-width="2.5" filter="url(#glow2)"/>
  <!-- Gear / settings -->
  <g transform="translate(140,60)">
    <circle cx="0" cy="0" r="16" fill="none" stroke="#a4d63a" stroke-width="2" filter="url(#glow2)">
      <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="6" fill="#89B927" opacity="0.5"/>
    <!-- Gear teeth -->
    <rect x="-3" y="-20" width="6" height="8" rx="2" fill="#a4d63a">
      <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="8s" repeatCount="indefinite"/>
    </rect>
    <rect x="-3" y="-20" width="6" height="8" rx="2" fill="#a4d63a">
      <animateTransform attributeName="transform" type="rotate" from="60 0 0" to="420 0 0" dur="8s" repeatCount="indefinite"/>
    </rect>
    <rect x="-3" y="-20" width="6" height="8" rx="2" fill="#a4d63a">
      <animateTransform attributeName="transform" type="rotate" from="120 0 0" to="480 0 0" dur="8s" repeatCount="indefinite"/>
    </rect>
    <rect x="-3" y="-20" width="6" height="8" rx="2" fill="#a4d63a">
      <animateTransform attributeName="transform" type="rotate" from="180 0 0" to="540 0 0" dur="8s" repeatCount="indefinite"/>
    </rect>
    <rect x="-3" y="-20" width="6" height="8" rx="2" fill="#a4d63a">
      <animateTransform attributeName="transform" type="rotate" from="240 0 0" to="600 0 0" dur="8s" repeatCount="indefinite"/>
    </rect>
    <rect x="-3" y="-20" width="6" height="8" rx="2" fill="#a4d63a">
      <animateTransform attributeName="transform" type="rotate" from="300 0 0" to="660 0 0" dur="8s" repeatCount="indefinite"/>
    </rect>
  </g>
  <!-- Light bulb above head -->
  <g transform="translate(60,55)">
    <path d="M0 0 L-8 -18 L8 -18 Z" fill="#89B927" opacity="0.6" filter="url(#glow2)">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
    </path>
    <line x1="-4" y1="-20" x2="4" y2="-20" stroke="#a4d63a" stroke-width="2" stroke-linecap="round"/>
  </g>
  <!-- Connection lines from person to gear -->
  <line x1="115" y1="68" x2="128" y2="65" stroke="#89B927" stroke-width="1" opacity="0.4" stroke-dasharray="3,3"/>
</svg>
