<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#89B927"/>
      <stop offset="100%" stop-color="#5a8a00"/>
    </linearGradient>
    <linearGradient id="g1b" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a4d63a"/>
      <stop offset="100%" stop-color="#89B927"/>
    </linearGradient>
    <filter id="glow1">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="#0b1929" stroke="url(#g1)" stroke-width="2.5"/>
  <circle cx="100" cy="100" r="78" fill="none" stroke="rgba(137,185,39,0.2)" stroke-width="1" stroke-dasharray="4,4"/>
  <!-- Brain / AI symbol -->
  <path d="M100 45 C75 45 55 60 55 85 C55 95 60 105 68 112 L100 140 L132 112 C140 105 145 95 145 85 C145 60 125 45 100 45Z" fill="none" stroke="url(#g1b)" stroke-width="3" filter="url(#glow1)"/>
  <!-- Neural connections -->
  <circle cx="85" cy="75" r="6" fill="#89B927" opacity="0.9"/>
  <circle cx="115" cy="75" r="6" fill="#89B927" opacity="0.9"/>
  <circle cx="100" cy="95" r="7" fill="#a4d63a" opacity="0.9"/>
  <circle cx="80" cy="100" r="5" fill="#89B927" opacity="0.7"/>
  <circle cx="120" cy="100" r="5" fill="#89B927" opacity="0.7"/>
  <circle cx="100" cy="115" r="5" fill="#89B927" opacity="0.7"/>
  <!-- Connection lines -->
  <line x1="85" y1="75" x2="115" y2="75" stroke="#89B927" stroke-width="1.5" opacity="0.5"/>
  <line x1="85" y1="75" x2="100" y2="95" stroke="#89B927" stroke-width="1.5" opacity="0.5"/>
  <line x1="115" y1="75" x2="100" y2="95" stroke="#89B927" stroke-width="1.5" opacity="0.5"/>
  <line x1="100" y1="95" x2="80" y2="100" stroke="#89B927" stroke-width="1.5" opacity="0.4"/>
  <line x1="100" y1="95" x2="120" y2="100" stroke="#89B927" stroke-width="1.5" opacity="0.4"/>
  <line x1="100" y1="95" x2="100" y2="115" stroke="#89B927" stroke-width="1.5" opacity="0.4"/>
  <line x1="80" y1="100" x2="100" y2="115" stroke="#89B927" stroke-width="1" opacity="0.3"/>
  <line x1="120" y1="100" x2="100" y2="115" stroke="#89B927" stroke-width="1" opacity="0.3"/>
  <!-- Circuit dots -->
  <circle cx="65" cy="65" r="2" fill="#89B927" opacity="0.4"/>
  <circle cx="135" cy="65" r="2" fill="#89B927" opacity="0.4"/>
  <circle cx="65" cy="130" r="2" fill="#89B927" opacity="0.4"/>
  <circle cx="135" cy="130" r="2" fill="#89B927" opacity="0.4"/>
  <!-- Pulse rings -->
  <circle cx="100" cy="95" r="14" fill="none" stroke="#89B927" stroke-width="1" opacity="0.2">
    <animate attributeName="r" values="14;24;14" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0;0.2" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
