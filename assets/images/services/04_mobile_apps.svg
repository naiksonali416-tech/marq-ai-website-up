<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="g4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#89B927"/>
      <stop offset="100%" stop-color="#5a8a00"/>
    </linearGradient>
    <filter id="glow4">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="#0b1929" stroke="url(#g4)" stroke-width="2.5"/>
  <circle cx="100" cy="100" r="78" fill="none" stroke="rgba(137,185,39,0.2)" stroke-width="1" stroke-dasharray="4,4"/>
  <!-- Phone body -->
  <rect x="72" y="40" width="56" height="105" rx="10" fill="none" stroke="#89B927" stroke-width="2.5" filter="url(#glow4)"/>
  <!-- Screen -->
  <rect x="78" y="55" width="44" height="72" rx="4" fill="rgba(137,185,39,0.06)" stroke="rgba(137,185,39,0.3)" stroke-width="1"/>
  <!-- Screen content - mini dashboard -->
  <rect x="82" y="60" width="16" height="12" rx="2" fill="rgba(137,185,39,0.3)"/>
  <rect x="102" y="60" width="16" height="12" rx="2" fill="rgba(137,185,39,0.2)"/>
  <rect x="82" y="76" width="36" height="8" rx="2" fill="rgba(137,185,39,0.15)"/>
  <rect x="82" y="88" width="20" height="20" rx="3" fill="rgba(137,185,39,0.2)"/>
  <rect x="106" y="88" width="12" height="9" rx="2" fill="rgba(137,185,39,0.15)"/>
  <rect x="106" y="100" width="12" height="9" rx="2" fill="rgba(137,185,39,0.15)"/>
  <!-- Home button -->
  <circle cx="100" cy="135" r="5" fill="none" stroke="#89B927" stroke-width="1.5" opacity="0.5"/>
  <!-- Notification badge -->
  <circle cx="125" cy="48" r="10" fill="#89B927" opacity="0.9" filter="url(#glow4)">
    <animate attributeName="r" values="10;12;10" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="125" y="52" text-anchor="middle" font-size="11" font-weight="700" fill="#0b1929" font-family="Arial">AI</text>
  <!-- Signal waves from phone -->
  <path d="M135 80 Q142 75 135 70" fill="none" stroke="#89B927" stroke-width="1.5" opacity="0.3"/>
  <path d="M140 82 Q150 75 140 68" fill="none" stroke="#89B927" stroke-width="1.5" opacity="0.2"/>
  <!-- Finger tap -->
  <circle cx="90" cy="110" r="4" fill="#a4d63a" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.2;0.5" dur="1.5s" repeatCount="indefinite"/>
  </circle>
</svg>
