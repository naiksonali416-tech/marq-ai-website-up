<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1290 626" width="1290" height="626">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1929"/>
      <stop offset="100%" style="stop-color:#142240"/>
    </linearGradient>
    <linearGradient id="stairGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0077cc"/>
      <stop offset="100%" style="stop-color:#00e676"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#ffc107"/>
      <stop offset="100%" style="stop-color:#ffd700"/>
    </linearGradient>
    <linearGradient id="brainGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#64ffda"/>
      <stop offset="100%" style="stop-color:#00b0ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="starGlow">
      <feGaussianBlur stdDeviation="10" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1290" height="626" fill="url(#bgGrad)"/>

  <!-- Stars -->
  <g fill="white" opacity="0.6">
    <circle cx="50" cy="30" r="1.2"/><circle cx="120" cy="80" r="0.8"/>
    <circle cx="200" cy="45" r="1"/><circle cx="310" cy="25" r="1.5"/>
    <circle cx="400" cy="70" r="0.7"/><circle cx="520" cy="35" r="1.1"/>
    <circle cx="640" cy="55" r="0.9"/><circle cx="750" cy="20" r="1.3"/>
    <circle cx="850" cy="65" r="0.8"/><circle cx="950" cy="40" r="1"/>
    <circle cx="1050" cy="30" r="1.2"/><circle cx="1150" cy="60" r="0.7"/>
    <circle cx="1230" cy="25" r="1"/><circle cx="80" cy="150" r="0.9"/>
    <circle cx="180" cy="200" r="1.1"/><circle cx="300" cy="170" r="0.7"/>
    <circle cx="450" cy="130" r="1"/><circle cx="600" cy="110" r="1.3"/>
    <circle cx="700" cy="160" r="0.8"/><circle cx="1100" cy="120" r="1"/>
    <circle cx="1200" cy="150" r="0.9"/><circle cx="150" cy="300" r="1.1"/>
    <circle cx="350" cy="350" r="0.8"/><circle cx="500" cy="280" r="1"/>
    <circle cx="900" cy="250" r="1.2"/><circle cx="1000" cy="200" r="0.7"/>
    <circle cx="1150" cy="300" r="1"/><circle cx="70" cy="450" r="0.9"/>
    <circle cx="250" cy="500" r="1.1"/><circle cx="400" cy="480" r="0.8"/>
    <circle cx="650" cy="520" r="1"/><circle cx="800" cy="450" r="1.2"/>
    <circle cx="1000" cy="500" r="0.7"/><circle cx="1180" cy="480" r="1"/>
    <circle cx="1050" cy="400" r="0.9"/><circle cx="550" cy="400" r="1.1"/>
    <circle cx="930" cy="380" r="0.8"/><circle cx="230" cy="420" r="1"/>
    <circle cx="1080" cy="550" r="1.2"/><circle cx="680" cy="580" r="0.7"/>
    <circle cx="430" cy="600" r="1"/><circle cx="870" cy="560" r="0.9"/>
  </g>
  <!-- Brighter stars -->
  <g fill="white" opacity="0.9" filter="url(#glow)">
    <circle cx="160" cy="90" r="1.8"/><circle cx="480" cy="50" r="2"/>
    <circle cx="780" cy="100" r="1.5"/><circle cx="1100" cy="80" r="1.8"/>
    <circle cx="340" cy="250" r="1.5"/><circle cx="960" cy="160" r="2"/>
    <circle cx="1250" cy="250" r="1.5"/><circle cx="100" cy="550" r="1.8"/>
  </g>

  <!-- ===== LEFT SIDE: AI Brain Icon ===== -->
  <g transform="translate(180, 250)" filter="url(#glow)">
    <!-- Brain outline -->
    <ellipse cx="0" cy="0" rx="55" ry="45" fill="none" stroke="url(#brainGlow)" stroke-width="2" opacity="0.8"/>
    <!-- Brain neural connections -->
    <g stroke="#64ffda" stroke-width="1" opacity="0.7">
      <line x1="-30" y1="-20" x2="10" y2="-30"/>
      <line x1="10" y1="-30" x2="30" y2="-10"/>
      <line x1="-20" y1="0" x2="15" y2="-5"/>
      <line x1="15" y1="-5" x2="35" y2="10"/>
      <line x1="-35" y1="15" x2="-5" y2="20"/>
      <line x1="-5" y1="20" x2="25" y2="25"/>
      <line x1="-25" y1="-10" x2="-10" y2="10"/>
      <line x1="10" y1="-25" x2="5" y2="0"/>
      <line x1="5" y1="0" x2="20" y2="20"/>
      <line x1="-30" y1="5" x2="0" y2="-15"/>
      <line x1="0" y1="-15" x2="25" y2="0"/>
    </g>
    <!-- Neural nodes -->
    <g fill="#64ffda">
      <circle cx="-30" cy="-20" r="3"/><circle cx="10" cy="-30" r="3"/>
      <circle cx="30" cy="-10" r="3"/><circle cx="-20" cy="0" r="3"/>
      <circle cx="15" cy="-5" r="3"/><circle cx="35" cy="10" r="3"/>
      <circle cx="-35" cy="15" r="3"/><circle cx="-5" cy="20" r="3"/>
      <circle cx="25" cy="25" r="3"/><circle cx="-25" cy="-10" r="2.5"/>
      <circle cx="-10" cy="10" r="2.5"/><circle cx="5" cy="0" r="3"/>
      <circle cx="20" cy="20" r="2.5"/>
    </g>
    <!-- AI text -->
    <text x="0" y="8" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#64ffda" filter="url(#glow)">AI</text>
  </g>

  <!-- ===== LEFT SIDE: Robot ===== -->
  <g transform="translate(120, 380)">
    <!-- Robot body -->
    <rect x="-22" y="10" width="44" height="50" rx="8" fill="#ffb74d"/>
    <!-- Robot head -->
    <rect x="-18" y="-25" width="36" height="32" rx="10" fill="#ffb74d"/>
    <!-- Eyes -->
    <circle cx="-7" cy="-12" r="5" fill="#1a237e"/>
    <circle cx="7" cy="-12" r="5" fill="#1a237e"/>
    <circle cx="-7" cy="-12" r="2.5" fill="#64ffda"/>
    <circle cx="7" cy="-12" r="2.5" fill="#64ffda"/>
    <!-- Mouth -->
    <rect x="-8" y="-2" width="16" height="3" rx="1.5" fill="#1a237e"/>
    <!-- Antenna -->
    <line x1="0" y1="-25" x2="0" y2="-35" stroke="#ffb74d" stroke-width="2"/>
    <circle cx="0" cy="-37" r="3" fill="#64ffda" filter="url(#glow)"/>
    <!-- Chest panel -->
    <rect x="-12" y="18" width="24" height="16" rx="4" fill="#2196f3"/>
    <circle cx="0" cy="26" r="4" fill="#64ffda" filter="url(#glow)"/>
    <!-- Arms -->
    <rect x="-32" y="14" width="10" height="30" rx="5" fill="#ffb74d"/>
    <rect x="22" y="14" width="10" height="30" rx="5" fill="#ffb74d"/>
    <!-- Legs -->
    <rect x="-15" y="60" width="12" height="25" rx="5" fill="#ffb74d"/>
    <rect x="3" y="60" width="12" height="25" rx="5" fill="#ffb74d"/>
    <!-- Feet -->
    <rect x="-18" y="82" width="18" height="8" rx="4" fill="#e65100"/>
    <rect x="0" y="82" width="18" height="8" rx="4" fill="#e65100"/>
  </g>

  <!-- ===== LEFT SIDE: Code Display ===== -->
  <g transform="translate(310, 380)">
    <!-- Holographic base -->
    <ellipse cx="0" cy="70" rx="50" ry="12" fill="#00b0ff" opacity="0.2" filter="url(#glowStrong)"/>
    <ellipse cx="0" cy="70" rx="35" ry="8" fill="#00b0ff" opacity="0.15"/>
    <!-- Screen -->
    <rect x="-45" y="-10" width="90" height="70" rx="6" fill="#0d2137" stroke="#00b0ff" stroke-width="1.5" opacity="0.9"/>
    <!-- Code lines -->
    <g font-family="monospace" font-size="7" opacity="0.9">
      <text x="-38" y="5" fill="#f44336">const</text><text x="-12" y="5" fill="#64ffda">ai</text><text x="0" y="5" fill="#fff">=</text><text x="10" y="5" fill="#ffd700">true</text>
      <text x="-38" y="17" fill="#2196f3">async</text><text x="-5" y="17" fill="#fff">fn()</text><text x="22" y="17" fill="#64ffda">{</text>
      <text x="-30" y="29" fill="#4caf50">return</text><text x="5" y="29" fill="#ffb74d">model</text>
      <text x="-38" y="41" fill="#64ffda">}</text>
      <text x="-38" y="53" fill="#fff">// AI power</text>
    </g>
    <!-- Floating particles -->
    <circle cx="-30" cy="60" r="1.5" fill="#64ffda" opacity="0.6"/>
    <circle cx="20" cy="55" r="1" fill="#00b0ff" opacity="0.5"/>
    <circle cx="35" cy="65" r="1.2" fill="#64ffda" opacity="0.4"/>
  </g>

  <!-- ===== CENTRAL STAIRCASE ===== -->
  <g filter="url(#glow)">
    <!-- Step 1 (bottom) -->
    <path d="M 380 520 L 580 520 L 580 480 L 420 480 Z" fill="url(#stairGrad)" opacity="0.85" stroke="#00e5ff" stroke-width="1"/>
    <!-- Circuit traces step 1 -->
    <g stroke="#00e5ff" stroke-width="0.8" opacity="0.6">
      <line x1="400" y1="500" x2="500" y2="500"/>
      <line x1="450" y1="485" x2="450" y2="515"/>
      <circle cx="500" cy="500" r="2" fill="#00e5ff"/>
      <circle cx="400" cy="500" r="2" fill="#00e5ff"/>
    </g>

    <!-- Step 2 -->
    <path d="M 450 440 L 650 440 L 650 400 L 490 400 Z" fill="url(#stairGrad)" opacity="0.85" stroke="#00e5ff" stroke-width="1"/>
    <!-- Circuit traces step 2 -->
    <g stroke="#00e5ff" stroke-width="0.8" opacity="0.6">
      <line x1="470" y1="420" x2="580" y2="420"/>
      <line x1="530" y1="405" x2="530" y2="435"/>
      <circle cx="580" cy="420" r="2" fill="#00e5ff"/>
      <circle cx="470" cy="420" r="2" fill="#00e5ff"/>
    </g>

    <!-- Step 3 -->
    <path d="M 520 360 L 720 360 L 720 320 L 560 320 Z" fill="url(#stairGrad)" opacity="0.85" stroke="#00e5ff" stroke-width="1"/>
    <!-- Circuit traces step 3 -->
    <g stroke="#00e5ff" stroke-width="0.8" opacity="0.6">
      <line x1="540" y1="340" x2="660" y2="340"/>
      <line x1="610" y1="325" x2="610" y2="355"/>
      <circle cx="660" cy="340" r="2" fill="#00e5ff"/>
      <circle cx="540" cy="340" r="2" fill="#00e5ff"/>
    </g>

    <!-- Step 4 -->
    <path d="M 590 280 L 790 280 L 790 240 L 630 240 Z" fill="url(#stairGrad)" opacity="0.85" stroke="#00e5ff" stroke-width="1"/>
    <!-- Circuit traces step 4 -->
    <g stroke="#00e5ff" stroke-width="0.8" opacity="0.6">
      <line x1="610" y1="260" x2="730" y2="260"/>
      <line x1="680" y1="245" x2="680" y2="275"/>
      <circle cx="730" cy="260" r="2" fill="#00e5ff"/>
      <circle cx="610" cy="260" r="2" fill="#00e5ff"/>
    </g>

    <!-- Step 5 -->
    <path d="M 660 200 L 860 200 L 860 160 L 700 160 Z" fill="url(#stairGrad)" opacity="0.85" stroke="#00e5ff" stroke-width="1"/>
    <!-- Circuit traces step 5 -->
    <g stroke="#00e5ff" stroke-width="0.8" opacity="0.6">
      <line x1="680" y1="180" x2="800" y2="180"/>
      <line x1="750" y1="165" x2="750" y2="195"/>
      <circle cx="800" cy="180" r="2" fill="#00e5ff"/>
      <circle cx="680" cy="180" r="2" fill="#00e5ff"/>
    </g>

    <!-- Step 6 -->
    <path d="M 730 120 L 930 120 L 930 80 L 770 80 Z" fill="url(#stairGrad)" opacity="0.85" stroke="#00e5ff" stroke-width="1"/>
    <!-- Circuit traces step 6 -->
    <g stroke="#00e5ff" stroke-width="0.8" opacity="0.6">
      <line x1="750" y1="100" x2="870" y2="100"/>
      <line x1="820" y1="85" x2="820" y2="115"/>
      <circle cx="870" cy="100" r="2" fill="#00e5ff"/>
      <circle cx="750" cy="100" r="2" fill="#00e5ff"/>
    </g>

    <!-- Motion lines left of stairs -->
    <g stroke="#00e5ff" stroke-width="1.5" opacity="0.4" filter="url(#glow)">
      <line x1="360" y1="510" x2="360" y2="470"/>
      <line x1="350" y1="500" x2="350" y2="460"/>
      <line x1="340" y1="490" x2="340" y2="450"/>
    </g>
  </g>

  <!-- ===== LEFT FIGURE (Green shirt, climbing stairs) ===== -->
  <g transform="translate(620, 200)">
    <!-- Legs -->
    <rect x="-6" y="25" width="9" height="28" rx="4" fill="#1a237e"/>
    <rect x="3" y="20" width="9" height="30" rx="4" fill="#1a237e"/>
    <!-- Shoes -->
    <ellipse cx="-1" cy="55" rx="7" ry="4" fill="#111"/>
    <ellipse cx="8" cy="52" rx="7" ry="4" fill="#111"/>
    <!-- Body -->
    <rect x="-10" y="-5" width="24" height="32" rx="5" fill="#4caf50"/>
    <!-- Left arm (reaching up) -->
    <rect x="-18" y="-25" width="9" height="28" rx="4" fill="#4caf50" transform="rotate(20, -14, -5)"/>
    <!-- Right arm (reaching toward star) -->
    <rect x="14" y="-30" width="9" height="30" rx="4" fill="#4caf50" transform="rotate(-40, 18, -5)"/>
    <!-- Hand -->
    <circle cx="11" cy="-55" r="5" fill="#e8b89d"/>
    <!-- Head -->
    <circle cx="2" cy="-20" r="12" fill="#e8b89d"/>
    <!-- Hair -->
    <ellipse cx="2" cy="-28" rx="12" ry="7" fill="#333"/>
    <!-- Face -->
    <circle cx="-2" cy="-20" r="1.5" fill="#333"/>
    <circle cx="6" cy="-20" r="1.5" fill="#333"/>
    <path d="M -1 -15 Q 2 -12 5 -15" stroke="#333" stroke-width="1" fill="none"/>
  </g>

  <!-- ===== RIGHT FIGURE (Light blue shirt, supporting) ===== -->
  <g transform="translate(870, 190)">
    <!-- Legs -->
    <rect x="-6" y="25" width="9" height="28" rx="4" fill="#424242"/>
    <rect x="3" y="25" width="9" height="28" rx="4" fill="#424242"/>
    <!-- Shoes -->
    <ellipse cx="-1" cy="55" rx="7" ry="4" fill="#222"/>
    <ellipse cx="8" cy="55" rx="7" ry="4" fill="#222"/>
    <!-- Body -->
    <rect x="-10" y="-5" width="24" height="32" rx="5" fill="#64b5f6"/>
    <!-- Tie -->
    <polygon points="2,-5 0,10 2,15 4,10" fill="#1a237e"/>
    <!-- Left arm (gesturing) -->
    <rect x="-22" y="-5" width="9" height="25" rx="4" fill="#64b5f6" transform="rotate(-15, -18, -5)"/>
    <!-- Right arm (open/welcoming) -->
    <rect x="14" y="-10" width="9" height="25" rx="4" fill="#64b5f6" transform="rotate(-30, 18, -5)"/>
    <!-- Hand -->
    <circle cx="10" cy="-30" r="5" fill="#e8b89d"/>
    <!-- Head -->
    <circle cx="2" cy="-20" r="12" fill="#e8b89d"/>
    <!-- Hair -->
    <ellipse cx="2" cy="-28" rx="12" ry="7" fill="#5d4037"/>
    <!-- Face -->
    <circle cx="-2" cy="-20" r="1.5" fill="#333"/>
    <circle cx="6" cy="-20" r="1.5" fill="#333"/>
    <path d="M -1 -15 Q 2 -11 5 -15" stroke="#333" stroke-width="1" fill="none"/>
  </g>

  <!-- ===== GOLDEN STAR (Top) ===== -->
  <g transform="translate(900, 50)" filter="url(#starGlow)">
    <polygon points="0,-35 8,-11 35,-11 14,5 22,30 0,15 -22,30 -14,5 -35,-11 -8,-11" fill="#ffd700" opacity="0.9"/>
    <polygon points="0,-25 6,-8 25,-8 10,4 16,22 0,11 -16,22 -10,4 -25,-8 -6,-8" fill="#ffeb3b" opacity="0.6"/>
  </g>

  <!-- ===== GOLDEN ARROW (from star to stairs) ===== -->
  <g filter="url(#glow)">
    <path d="M 890 85 L 890 55 L 870 55 L 900 25 L 930 55 L 910 55 L 910 85 Z" fill="url(#arrowGrad)" opacity="0.8"/>
  </g>

  <!-- ===== FLOATING DECORATIVE ELEMENTS ===== -->
  <!-- Small trophy icon (left) -->
  <g transform="translate(250, 180)" opacity="0.8">
    <rect x="-8" y="5" width="16" height="4" rx="2" fill="#8d6e63"/>
    <rect x="-4" y="9" width="8" height="5" rx="1" fill="#8d6e63"/>
    <path d="M -10 -5 L -10 5 Q -10 10 0 10 Q 10 10 10 5 L 10 -5 Z" fill="#ffd700"/>
    <path d="M -10 -2 Q -18 0 -16 6 L -10 4" fill="#ffd700" stroke="#ffc107" stroke-width="0.5"/>
    <path d="M 10 -2 Q 18 0 16 6 L 10 4" fill="#ffd700" stroke="#ffc107" stroke-width="0.5"/>
  </g>

  <!-- Medal icon (left) -->
  <g transform="translate(170, 170)" opacity="0.8">
    <circle cx="0" cy="5" r="10" fill="#ffd700" stroke="#ffc107" stroke-width="1"/>
    <text x="0" y="9" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#8d6e63">1</text>
    <path d="M -5 -5 L -8 -15 L 0 -10 L 8 -15 L 5 -5" fill="#4caf50"/>
  </g>

  <!-- Certificate icon (left) -->
  <g transform="translate(350, 200)" opacity="0.7">
    <rect x="-15" y="-12" width="30" height="22" rx="2" fill="white" stroke="#2196f3" stroke-width="1.5"/>
    <line x1="-10" y1="-5" x2="10" y2="-5" stroke="#bbb" stroke-width="1"/>
    <line x1="-10" y1="0" x2="10" y2="0" stroke="#bbb" stroke-width="1"/>
    <line x1="-10" y1="5" x2="5" y2="5" stroke="#bbb" stroke-width="1"/>
    <circle cx="10" cy="12" r="4" fill="#ffd700"/>
  </g>

  <!-- ===== NEON ACCENT LINES ===== -->
  <g stroke="#00e5ff" stroke-width="1" opacity="0.3" filter="url(#glow)">
    <line x1="50" y1="580" x2="200" y2="580"/>
    <line x1="1050" y1="600" x2="1240" y2="600"/>
    <line x1="1100" y1="350" x2="1250" y2="350"/>
  </g>

  <!-- ===== CONNECTING DOTS (circuit style) ===== -->
  <g fill="#00e5ff" opacity="0.4">
    <circle cx="60" cy="580" r="2.5"/>
    <circle cx="190" cy="580" r="2.5"/>
    <circle cx="1060" cy="600" r="2.5"/>
    <circle cx="1230" cy="600" r="2.5"/>
    <circle cx="1110" cy="350" r="2.5"/>
    <circle cx="1240" cy="350" r="2.5"/>
  </g>

  <!-- ===== SUBTLE GRID PATTERN (background depth) ===== -->
  <g stroke="#0d2137" stroke-width="0.5" opacity="0.3">
    <line x1="0" y1="100" x2="1290" y2="100"/>
    <line x1="0" y1="200" x2="1290" y2="200"/>
    <line x1="0" y1="300" x2="1290" y2="300"/>
    <line x1="0" y1="400" x2="1290" y2="400"/>
    <line x1="0" y1="500" x2="1290" y2="500"/>
  </g>
</svg>
